# Dum-E runtime configuration.
# See architecture.md "Implementation Patterns D. Naming & Structure".

# --- Acquire (Story 2.x) ----------------------------------------------------
# Which phrase->box backend to use: claude_box | yoloe | yolo_world
# claude_box is the zero-dependency default for first-light (no model, no GPU).
acquire_backend: claude_box

# --- Camera (Story 1.2 / 1.3) ----------------------------------------------
# "Image+ Fic760x" USB UVC camera on /dev/video0 (replaced a Logitech C920).
# Verified by dum_e.camera.record_clip: CLEAN 1080p30 — 0.56% brightness CoV,
# full 29.8 fps (the C920 could only manage flickery ~4.7% CoV 1080p).
# Anti-flicker settings are applied by camera.py AFTER the format is set
# (UVC resets exposure on format change).
# NOTE: GUI camera apps (Cheese / GNOME Camera) flicker because they run their
# own auto-exposure — that is NOT Dum-E's capture path. Ignore GUI-app flicker.
camera_index: 0            # OpenCV device index of the arm-mounted USB camera
camera:
  width: 1920             # this camera does clean 1080p30
  height: 1080
  fps: 30
  exposure: 200            # manual exposure: 200=20ms (50Hz mains), 167=16.6ms (60Hz)
  power_line_frequency: 1  # 1 = 50Hz, 2 = 60Hz (match your mains)
  gain: 8                  # this camera's gain maxes at 15 and barely affects brightness;
                           # exposure is the real brightness lever (don't change it lightly —
                           # it must stay a multiple of the mains half-period for anti-flicker)
  rotate: 180              # CCW degrees applied on capture (0/90/180/270). Camera was
                           # remounted (servo-board swap 2026-06-22); 180° now gives an upright
                           # LANDSCAPE frame (apple on the desk below, arm reaching in from above).
  autofocus: false         # lock focus (manual) so AF can't hunt/breathe during a moving shot
  focus: 640               # focus_absolute for a subject at bench distance (measured 2026-06-22;
                           # re-tune if the camera-to-subject distance changes a lot)

# --- Arm connection (Story 1.2 / 1.4 / 1.5) --------------------------------
arm:
  port: "/dev/ttyUSB0"     # SO-101 motor bus @ 1,000,000 baud. NOTE: enumerates as /dev/ttyUSB0 on the
                           # old-PSU/board rig, /dev/ttyACM0 on the battery rig — flip this if you swap setups.
  baud: 1000000
  joint_units: deg         # Feetech STS3215 (model 777)
  # 6-DoF CAMERA arm: motor 6 is NO LONGER the gripper — it now carries half a
  # leader-arm linkage that pans the camera (yaw) independently of the wrist.
  motor_ids: [1, 2, 3, 4, 5, 6]   # shoulder_pan, shoulder_lift, elbow_flex, wrist_flex, wrist_roll, camera_pan

# --- Motion safety (Story 1.5, FR-14) --------------------------------------
# arm.py enforces these. joint_limits_deg below are REAL, measured by
# `calibrate.py range` on 2026-06-21 (centered, symmetric, 3deg safety margin).
# MATCHED SET: these are valid only against the homing offsets persisted in the
# servos' EEPROM + calibration/joints.json. If the arm is reassembled/re-homed,
# regenerate both (run `range` per joint) — stale limits would be in the wrong frame.
safety:
  joint_limits_deg:        # per-joint [min, max] deg, centered frame, 4deg margin
    - [-103.6, 103.6]      # 1 shoulder_pan
    - [-102.1, 102.1]      # 2 shoulder_lift
    - [-87.8, 87.8]        # 3 elbow_flex (new servo, re-calibrated 2026-06-22)
    - [-98.3, 98.3]        # 4 wrist_flex
    - [-160.9, 160.9]      # 5 wrist_roll  (near-360 travel; wrap sits in the dead zone)
    - [-49.1, 49.1]        # 6 camera_pan
  workspace_box: null      # optional Cartesian bounding box; null = joint-limits only
  velocity_cap_deg_per_step: 5.0   # max change per joint per control tick
  stop_sentinel: runs/STOP         # presence of this file halts motion immediately

# --- Framing / servo (Story 2.4) -------------------------------------------
center_tolerance_frac: 0.20   # "centered" = target centroid within central 20% of frame

# --- Video (Story 3.x / 4.4) -----------------------------------------------
clip:
  target_seconds_min: 15
  target_seconds_max: 40
  resolution: [1920, 1080]
